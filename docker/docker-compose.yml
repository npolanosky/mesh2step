# mesh2step-web — Portainer-stack-ready compose.
#
# Default: pull the prebuilt PRIVATE image from GHCR (built by
# .github/workflows/docker.yml on every push to main). See docker/README.md
# for the full private-registry Portainer walk-through.
#
# To build locally instead (e.g. hacking on the Dockerfile), comment out
# `image:` below and uncomment the `build:` block.
#
# The service binds 0.0.0.0 inside the container (set via the image env) and is
# published on the host at ${MESH2STEP_PORT:-8799}.

services:
  mesh2step-web:
    # --- Default: prebuilt private image from GHCR ---
    image: ghcr.io/npolanosky/mesh2step-web:latest
    # --- Fallback: build from this repo instead (uncomment to use) ---
    # build:
    #   context: ..
    #   dockerfile: docker/Dockerfile
    container_name: mesh2step-web
    restart: unless-stopped

    # Host:container port. Container listens on 8799 (MESH2STEP_WEB_PORT baked in
    # the image). Override the host side with MESH2STEP_PORT in the stack env.
    ports:
      - "${MESH2STEP_PORT:-8799}:8799"

    environment:
      # Concurrency 1 keeps FreeCAD/OCC single-threaded per box; bump on a beefy
      # server. All other knobs (data dir, corpus dir, host/port, FreeCAD python)
      # are baked into the image with sensible container defaults.
      MESH2STEP_WEB_CONCURRENCY: "${MESH2STEP_CONCURRENCY:-1}"
      # Per-conversion wall-clock ceiling (seconds).
      MESH2STEP_WEB_TIMEOUT: "${MESH2STEP_TIMEOUT:-1800}"
      # Max upload size in bytes (default 200 MB).
      MESH2STEP_WEB_MAX_UPLOAD: "${MESH2STEP_MAX_UPLOAD:-209715200}"

    volumes:
      # Job history + uploads + STEP outputs (survives restarts/upgrades).
      - mesh2step-web-data:/data/web
      # Failure corpus (flagged/failed meshes for regression). HOST BIND mount so
      # the meshes land on the host filesystem and can be synced back to a dev
      # machine (e.g. via Syncthing). Defaults to ./mesh2step-corpus next to this
      # compose file; override the host path with MESH2STEP_CORPUS_DIR.
      # NOTE: the container runs as uid:gid 10001 — the host dir must be writable
      # by that uid (see docker/README.md: chown or a `user:` override).
      - ${MESH2STEP_CORPUS_DIR:-./mesh2step-corpus}:/data/corpus

    # Liveness probe hits the cheap /healthz endpoint (no disk, no subprocess).
    # Portainer shows the container as healthy/unhealthy from this.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8799/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      # Give FreeCAD-heavy startup room before the first probe counts against us.
      start_period: 40s

volumes:
  # Job history stays in a named Docker volume (opaque, not synced anywhere).
  mesh2step-web-data:
    name: mesh2step-web-data
  # NOTE: the failure corpus is NO LONGER a named volume — it is a host bind
  # mount (see the service `volumes:` above) so it can be Syncthing'd to a dev
  # machine. Nothing to declare here for a bind mount.
